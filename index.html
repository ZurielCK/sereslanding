    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Psychologist", "LocalBusiness"],
      "@id": "https://DOMINIO/#negocio",
      "name": "SerEs Psicoterapia Corporal Humanista",
      "url": "https://DOMINIO/",
      "telephone": "+527777891025",
      "image": "https://DOMINIO/favicon.png",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Cuernavaca",
        "addressRegion": "Morelos",
        "addressCountry": "MX"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 18.9090,
        "longitude": -99.2313
      },
      "sameAs": [
        "https://www.instagram.com/seres_consenti2",
        "https://www.facebook.com/seres.psicoterapia",
        "https://g.page/r/CXYnQ4kSgsS1EAE/review"
      ],

        "@type": "AggregateRating",

        "reviewCount": "3",

        "worstRating": "1"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios de Psicoterapia",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Terapia individual" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Terapia de pareja" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Manejo de ansiedad y estrés" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Crecimiento personal" } }
        ]
      }
    }

    <!-- ═══════════════════════════════════════════
         JSON-LD — FAQPage
         ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cuánto dura cada sesión?",
          "acceptedAnswer": { "@type": "Answer", "text": "Cada sesión tiene una duración de 50 a 60 minutos aproximadamente." }
        },
        {
          "@type": "Question",
          "name": "¿Cuántas sesiones necesito?",
          "acceptedAnswer": { "@type": "Answer", "text": "El número de sesiones varía según cada persona y sus objetivos. En la primera sesión realizamos una evaluación inicial para trazar un plan de trabajo." }
        },
        {
          "@type": "Question",
          "name": "¿Atiende de forma presencial y en línea?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí, ofrezco ambas modalidades. Presencial en Cuernavaca, Morelos y en línea para cualquier parte de México." }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta la consulta?",
          "acceptedAnswer": { "@type": "Answer", "text": "El costo varía según el tipo de consulta y la modalidad. Contáctame por WhatsApp para información personalizada sobre tarifas." }
        },
        {
          "@type": "Question",
          "name": "¿Es confidencial lo que se habla en terapia?",

        }
      ]
    }
    </script>
