# wrangler.toml — configuración de Cloudflare Pages
# Usado por `wrangler pages dev` para desarrollo local de las Functions.
# En producción (Cloudflare Pages dashboard) configura las variables de entorno
# y el binding KV manualmente.

name = "sereslanding"
pages_build_output_dir = "dist"

# ─── Variables de entorno ────────────────────────────────────────────────────
# En producción: Cloudflare Pages > Settings > Environment variables
# Agrega GOOGLE_PLACES_API_KEY con tu API key (nunca en este archivo)
#
# Para desarrollo local con wrangler pages dev:
# crea un archivo .dev.vars con:
#   GOOGLE_PLACES_API_KEY=tu_api_key_aqui

# ─── Workers KV (caché de reseñas 24h) ──────────────────────────────────────
# Pasos para habilitar:
# 1. Cloudflare Dashboard > Workers & Pages > KV
# 2. Crear namespace "REVIEWS_KV"
# 3. Cloudflare Pages > tu proyecto > Settings > Functions > KV namespace bindings
#    Variable name: REVIEWS_KV  →  KV namespace: el que creaste
#
# Descomenta y actualiza cuando tengas el namespace ID:
# [[kv_namespaces]]
# binding = "REVIEWS_KV"
# id = "TU_KV_NAMESPACE_ID"
